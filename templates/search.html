<!DOCTYPE html>
<html>
<head>
    <title>BifidoBase</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6fb;
            margin: 0;
        }

        .header {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .navbar {
            text-align: center;
            padding: 10px;
            background: #eee;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .navbar a {
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        .container {
            width: 85%;
            margin: auto;
            margin-top: 40px;
            text-align: center;
        }

        #searchBox {
            width: 75%;
            padding: 14px;
            font-size: 16px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        #suggestions {
            width: 75%;
            margin: auto;
            background: white;
            border: 1px solid #ccc;
            position: relative;
            display: none;
            text-align: left;
        }

        .filters {
            margin-top: 15px;
        }

        select {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
            background: #2a5298;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th {
            background: #2a5298;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>BifidoBase</h1>
</div>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/search-page">Search</a>
    <a href="/compare-page">Compare</a>
</div>

<div class="container">

    <!-- SEARCH -->
    <input type="text" id="searchBox" placeholder="Search by species (e.g. longum) or accession (e.g. GCF_...)">
    <div id="suggestions"></div>

    <!-- FILTERS -->
    <div class="filters" style="
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        align-items: center;
        gap: 10px;
    ">

        <select id="sourceFilter">
            <option value="All">All Sources</option>
        </select>

        <select id="countryFilter">
            <option value="All">All Countries</option>
        </select>

        <select id="assemblyFilter">
            <option value="All">All Assembly Levels</option>
        </select>
        <select id="accessionFilter">
            <option value="All">All Databases</option>
            <option value="RefSeq">RefSeq (GCF)</option>
            <option value="GenBank">GenBank (GCA)</option>
        </select>
        <select id="genomeType">
            <option value="">All Genomes</option>
            <option value="isolate">Isolate</option>
            <option value="MAG">MAG</option>
        </select>
        <select id="statFilter">
            <option value="">Filter by Metric</option>
            <option value="gc_content">GC %</option>
            <option value="genome_size">Genome Size</option>
            <option value="n50">N50</option>
            <option value="contigs">Contigs</option>
            <option value="l50">L50</option>
            <option value="completeness">Completeness</option>
            <option value="contamination">Contamination</option>
        </select>

        <select id="statRange">
            <option value="">Select Range</option>
        </select>
        <input type="number" id="statMin" placeholder="Min" style="width:80px; margin-left:10px;">
        <input type="number" id="statMax" placeholder="Max" style="width:80px;">
        <label style="
            display:inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            background: #eef2ff;
            margin-left:10px;
            border-radius: 6px;
            font-size: 13px;
            white-space:nowrap
        ">
            <input type="checkbox" id="refineToggle">
            Filter within current results
        </label>



        <button id="searchBtn">Search</button>

    </div>
    <div id="resultCount" style="margin-top:20px; font-weight:bold;"></div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Accession</th>
                <th>Species</th>
                <th>Source</th>
                <th>Country</th>
                <th>Assembly Level</th>
                <th id="extraHeader" style="display:none;"></th>
            </tr>
        </thead>
        <tbody id="resultsTable"></tbody>
    </table>
    <div style="display:flex; justify-content:flex-end; margin-top:10px;">
        <button id="downloadBtn" style="padding:8px 16px;">
            ⬇ Download Filtered Genomes
        </button>
    </div>

    <div style="margin-top: 15px; text-align: center;">
        <button onclick="prevPage()" id="prevBtn">⬅ Prev</button>
        <span id="pageInfo" style="margin: 0 15px; font-weight: bold;">Page 1</span>
        <button onclick="nextPage()" id="nextBtn">Next ➡</button>
    </div>


</div>

<script src="/static/script.js"></script>

</body>
</html>
