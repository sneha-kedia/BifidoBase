<!DOCTYPE html>
<html>
<head>
    <title>BifidoBase</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f6fb;
            margin: 0;
        }

        .header {
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            padding: 25px;
            text-align: center;
        }

        .navbar {
            text-align: center;
            padding: 10px;
            background: #eee;
        }

        .navbar a {
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            color: #333;
        }

        .container {
            width: 80%;
            margin: auto;
            margin-top: 40px;
            text-align: center;
        }

        #searchBox {
            width: 60%;
            padding: 12px;
            font-size: 16px;
        }

        #suggestions {
            width: 60%;
            margin: auto;
            background: white;
            border: 1px solid #ccc;
            position: relative;
            display: none;
            text-align: left;
        }

        .filters {
            margin-top: 15px;
        }

        select {
            padding: 8px;
            margin: 5px;
        }

        button {
            padding: 10px 20px;
            background: #2a5298;
            color: white;
            border: none;
            cursor: pointer;
        }

        table {
            width: 100%;
            margin-top: 30px;
            border-collapse: collapse;
        }

        th {
            background: #2a5298;
            color: white;
            padding: 10px;
        }

        td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>BifidoBase</h1>
</div>

<div class="navbar">
    <a href="/">Home</a>
    <a href="/search-page">Search</a>
    <a href="/compare-page">Compare</a>
</div>

<div class="container">

    <!-- SEARCH -->
    <input type="text" id="searchBox" placeholder="Search species...">
    <div id="suggestions"></div>

    <!-- FILTERS -->
    <div class="filters">
        <select id="sourceFilter">
            <option value="All">All Sources</option>
        </select>

        <select id="countryFilter">
            <option value="All">All Countries</option>
        </select>

        <select id="assemblyFilter">
            <option value="All">All Assembly Levels</option>
        </select>

        <button id="searchBtn">Search</button>
    </div>

    <!-- TABLE -->
    <table>
        <thead>
            <tr>
                <th>Accession</th>
                <th>Species</th>
                <th>Source</th>
                <th>Country</th>
                <th>Assembly Level</th>
            </tr>
        </thead>
        <tbody id="resultsTable"></tbody>
    </table>
    <div style="margin-top: 15px; text-align: center;">
        <button onclick="prevPage()">⬅ Prev</button>
        <span id="pageInfo" style="margin: 0 10px;">Page 1</span>
        <button onclick="nextPage()">Next ➡</button>
    </div>


</div>

<script src="/static/script.js"></script>

</body>
</html>
